name: E2E Kind nvml-mock

on:
  workflow_dispatch:
  push:
    branches:
      - "pull-request/[0-9]+"
    paths:
      - ".github/workflows/e2e-kind-nvml-mock.yaml"
      - "Dockerfile"
      - "charts/topograph/**"
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
      - "tests/e2e/**"
      - "go.mod"
      - "go.sum"

jobs:
  kind-nvml-mock:
    runs-on: linux-amd64-cpu16
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Helm
      uses: azure/setup-helm@v5
      with:
        version: v4.1.1

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4

    - name: Set up kind
      uses: helm/kind-action@v1
      with:
        install_only: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Run kind nvml-mock e2e
      run: tests/e2e/kind-nvml-mock.sh

    - name: Dump cluster diagnostics
      if: failure()
      run: |
        set +e
        kubectl --context kind-topograph-nvml-mock get nodes -o wide
        kubectl --context kind-topograph-nvml-mock get pods -A -o wide
        kubectl --context kind-topograph-nvml-mock get events -A --sort-by=.lastTimestamp
        kubectl --context kind-topograph-nvml-mock -n topograph logs deploy/topograph --all-containers --tail=200
        kubectl --context kind-topograph-nvml-mock -n topograph logs daemonset/topograph-node-data-broker --all-containers --tail=200
        kubectl --context kind-topograph-nvml-mock -n nvml-mock-system logs -l app.kubernetes.io/instance=nvml-mock --all-containers --tail=200
        kubectl --context kind-topograph-nvml-mock -n slurm get pods -o wide
        kubectl --context kind-topograph-nvml-mock -n slinky get pods -o wide

    - name: Delete kind cluster
      if: always()
      run: kind delete cluster --name topograph-nvml-mock
