# Publishes the Fern documentation site when docs/ or fern/ changes land on
# main, when a docs tag is pushed, or when manually triggered.
#
# To publish a versioned release: git tag docs/v1.2.0 && git push origin docs/v1.2.0
# Or use the "Run workflow" button in the Actions tab.
#
# Required configuration:
# - Organization secret: DOCS_FERN_TOKEN (from `fern token` for the nvidia Fern org)

name: Publish Fern Docs

on:
  push:
    paths:
      - 'docs/**'
      - 'fern/**'
    tags:
      - 'docs/v*'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: fern-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: linux-amd64-cpu8
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Fern CLI
        run: npm install -g fern-api@$(jq -r .version fern/fern.config.json)

      - name: Publish Docs
        env:
          FERN_TOKEN: ${{ secrets.DOCS_FERN_TOKEN }}
        working-directory: ./fern
        run: |
          # Stream fern's output to both the Actions log (via tee) and a temp
          # file for URL extraction. The prior shape `OUTPUT=$(fern ... 2>&1)`
          # swallowed fern's error output on failure because `bash -e` would
          # abort on fern's non-zero exit before the subsequent `echo "$OUTPUT"`
          # ran, leaving failed publishes with no diagnostic in the log.
          set -o pipefail
          fern generate --docs 2>&1 | tee /tmp/fern-output.log
          URL=$(grep -oP 'Published docs to \K.*(?= \()' /tmp/fern-output.log || true)
          if [ -n "$URL" ]; then
            echo "### Published: [$URL]($URL)" >> "$GITHUB_STEP_SUMMARY"
          fi
