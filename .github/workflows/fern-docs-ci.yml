name: Fern Docs CI

on:
  push:
    paths:
      - 'docs/**'
      - 'fern/**'
      - '.github/workflows/fern-docs-ci.yml'
    branches:
      - "pull-request/[0-9]+"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fern-check:
    name: Fern Check
    runs-on: linux-amd64-cpu8
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check markdown filename conventions
        run: |
          BAD=$(find docs/ -name '*.md' | grep -E '[A-Z_]' || true)
          if [ -n "$BAD" ]; then
            echo "::error::Markdown filenames must be lowercase with hyphens only:"
            echo "$BAD"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Fern CLI
        run: npm install -g fern-api@$(jq -r .version fern/fern.config.json)

      - name: Check MDX safety
        run: |
          BAD=$(grep -rn '<img\b[^>]*[^/]>' docs/ --include="*.md" || true)
          if [ -n "$BAD" ]; then
            echo "::error::Non-self-closing <img> tags found (MDX requires <img ... />):"
            echo "$BAD"
            exit 1
          fi

      - name: Fern check
        run: fern check

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress 'docs/**/*.md'
          fail: true
