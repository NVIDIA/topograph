# Default values for topology-generator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  provider:
    name: infiniband-k8s
  engine:
    name: k8s

node-observer:
  topograph:
    trigger:
      nodeSelector:
        brightcomputing.com/node-category: dgx

node-data-broker:
  image:
    repository: ghcr.io/nvidia/topograph/ib
    pullPolicy: IfNotPresent
    tag: main
  initc:
    extraArgs:
    - gpu-operator-namespace=gpu-operator
    - device-plugin-daemonset=nvidia-device-plugin-daemonset
  securityContext:
    privileged: true
  nodeSelector:
    brightcomputing.com/node-category: dgx
  volumeMounts:
  - name: sys-class
    mountPath: /sys/class
  volumes:
  - name: sys-class
    hostPath:
      path: /sys/class
      type: Directory
