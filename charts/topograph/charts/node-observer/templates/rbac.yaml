{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "node-observer.rbacName" . }}
rules:
- apiGroups: [""]
  resources: [pods]
  verbs: [list,watch]
{{- if (default dict .Values.topograph.trigger).nodeSelector }}
- apiGroups: [""]
  resources: [nodes]
  verbs: [list,watch]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "node-observer.rbacName" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "node-observer.serviceAccountName" . }}
  namespace: {{.Release.Namespace}}
  apiGroup: ""
roleRef:
  kind: ClusterRole
  name: {{ include "node-observer.rbacName" . }}
  apiGroup: ""
{{- end }}
