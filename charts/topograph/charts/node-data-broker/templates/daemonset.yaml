{{- if .Values.enabled }}
{{- $providerParams := default dict .Values.global.provider.params }}
{{- $useGpuCliqueLabel := and (eq .Values.global.provider.name "infiniband-k8s") (eq (lower (toString (get $providerParams "useGpuCliqueLabel"))) "true") }}
{{- $configMapMounts := default list .Values.configMapMounts }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "node-data-broker.fullname" . }}
  labels:
    {{- include "node-data-broker.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "node-data-broker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "node-data-broker.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "node-data-broker.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.initc.enabled }}
      initContainers:
        - name: init-node-labels
          image: "{{ .Values.initc.image.repository }}:{{ .Values.initc.image.tag }}"
          imagePullPolicy: {{ .Values.initc.image.pullPolicy }}
          command:
            - /usr/local/bin/node-data-broker-initc
          args:
            - --provider={{ .Values.global.provider.name }}
            - -v={{ .Values.verbosity }}
            {{- if $useGpuCliqueLabel }}
            - --set=useGpuCliqueLabel=true
            {{- end }}
            {{- range .Values.initc.extraArgs }}
            - --set={{ . }}
            {{- end }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          {{- if or $configMapMounts .Values.volumeMounts }}
          volumeMounts:
            {{- range $configMapMounts }}
            - name: {{ include "node-data-broker.configMapMountVolumeName" (dict "name" .name) }}
              mountPath: {{ required "node-data-broker.configMapMounts[].mountPath is required" .mountPath | quote }}
              {{- with .subPath }}
              subPath: {{ . | quote }}
              {{- end }}
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or $configMapMounts .Values.volumeMounts }}
          volumeMounts:
            {{- range $configMapMounts }}
            - name: {{ include "node-data-broker.configMapMountVolumeName" (dict "name" .name) }}
              mountPath: {{ required "node-data-broker.configMapMounts[].mountPath is required" .mountPath | quote }}
              {{- with .subPath }}
              subPath: {{ . | quote }}
              {{- end }}
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or $configMapMounts .Values.volumes }}
      volumes:
        {{- range $configMapMounts }}
        - name: {{ include "node-data-broker.configMapMountVolumeName" (dict "name" .name) }}
          configMap:
            name: {{ include "node-data-broker.configMapMountName" (dict "root" $ "name" .name) }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
