{{- if .Values.enabled }}
{{- $providerParams := default dict .Values.global.provider.params }}
{{- $useGpuCliqueLabel := and (eq .Values.global.provider.name "infiniband-k8s") (eq (lower (toString (get $providerParams "useGpuCliqueLabel"))) "true") }}
{{- $configMapMounts := default list .Values.configMapMounts }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "node-data-broker.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "node-data-broker.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "node-data-broker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "node-data-broker.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "node-data-broker.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "node-data-broker.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/local/bin/node-data-broker
          args:
            - --provider={{ .Values.global.provider.name }}
            - -v={{ .Values.verbosity }}
            - --port={{ .Values.port }}
            - --refresh-interval={{ .Values.refreshInterval }}
            {{- if $useGpuCliqueLabel }}
            - --set=useGpuCliqueLabel=true
            {{- end }}
            {{- range .Values.extraArgs }}
            - --set={{ . }}
            {{- end }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          # The broker applies node annotations before it starts serving
          # /healthz. The startup probe gates liveness/readiness so slow
          # providers (e.g. infiniband ibnetdiscover) have up to
          # failureThreshold * periodSeconds to finish before the container can
          # be restarted.
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or $configMapMounts .Values.volumeMounts }}
          volumeMounts:
            {{- range $configMapMounts }}
            - name: {{ include "node-data-broker.configMapMountVolumeName" (dict "name" .name) }}
              mountPath: {{ required "node-data-broker.configMapMounts[].mountPath is required" .mountPath | quote }}
              {{- with .subPath }}
              subPath: {{ . | quote }}
              {{- end }}
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or $configMapMounts .Values.volumes }}
      volumes:
        {{- range $configMapMounts }}
        - name: {{ include "node-data-broker.configMapMountVolumeName" (dict "name" .name) }}
          configMap:
            name: {{ include "node-data-broker.configMapMountName" (dict "root" $ "name" .name) }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
