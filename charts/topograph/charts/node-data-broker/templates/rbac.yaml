{{- if and .Values.enabled .Values.rbac.create }}
{{- $providerParams := default dict .Values.global.provider.params }}
{{- $useGpuCliqueLabel := and (eq .Values.global.provider.name "infiniband-k8s") (eq (lower (toString (get $providerParams "useGpuCliqueLabel"))) "true") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "node-data-broker.rbacName" . }}
rules:
- apiGroups: [""]
  resources: [nodes]
  verbs: [get,list,update]
{{- if and (eq .Values.global.provider.name "infiniband-k8s") (not $useGpuCliqueLabel) }}
- apiGroups: [apps]
  resources: [daemonsets]
  verbs: [get,list]
- apiGroups: [""]
  resources: [pods]
  verbs: [get,list]
- apiGroups: [""]
  resources: [pods/exec]
  verbs: [create]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "node-data-broker.rbacName" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "node-data-broker.serviceAccountName" . }}
  namespace: {{.Release.Namespace}}
  apiGroup: ""
roleRef:
  kind: ClusterRole
  name: {{ include "node-data-broker.rbacName" . }}
  apiGroup: ""
{{- end }}
