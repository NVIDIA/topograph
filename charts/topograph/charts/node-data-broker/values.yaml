# Default values for node-data-broker.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  repository: ghcr.io/nvidia/topograph
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

enabled: true

# Port the node-data-broker serves its /healthz endpoint on after applying
# node annotations.
port: 8080

# How often to re-apply node annotations after the initial startup apply.
# Slow providers (e.g. infiniband ibnetdiscover) may need a longer interval.
# Set to 0 to disable periodic refresh.
refreshInterval: 5m

# When disabling this subchart, also set
# node-observer.topograph.nodeDataBroker.enabled to false so topology
# generation is not blocked waiting for broker pods.

# Extra key=value parameters passed to node-data-broker via --set
# (e.g. gpu-operator-namespace / device-plugin-daemonset for infiniband-k8s).
extraArgs: []
#  - key=val

# Startup probe for the node-data-broker container. The broker applies node
# annotations before it starts serving /healthz, so the startup probe gates the
# liveness/readiness probes and gives slow providers (e.g. infiniband
# ibnetdiscover) time to finish. The total startup budget is
# failureThreshold * periodSeconds (default 30 * 10s = 5m).
startupProbe:
  failureThreshold: 30
  periodSeconds: 10

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

rbac:
  # Specifies whether RBAC resources should be created for the service account
  create: true

verbosity: 3

# Additional environment variables for the node-data-broker container.
env: {}

# Additional init containers for the node-data-broker Pod.
initContainers: []

# Optional lifecycle hooks for the node-data-broker container.
lifecycle: {}

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Optional ConfigMaps rendered by the chart and mounted into the
# node-data-broker container. Set subPath for file mounts;
# omit it to mount the whole ConfigMap as a directory.
configMapMounts: []
# name is used as a Kubernetes resource and volume suffix; keep it DNS-label-safe.
# - name: ibdiag
#   mountPath: /etc/infiniband-diags/ibdiag.conf
#   subPath: ibdiag.conf
#   data:
#     ibdiag.conf: |-
#       CA=smi0
#       Port=1

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
