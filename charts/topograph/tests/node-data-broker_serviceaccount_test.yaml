suite: node-data-broker service account
release:
  name: chart-ci
  namespace: topograph
tests:
  - it: creates a service account by default
    templates:
      - templates/nodeDataBroker/serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: chart-ci-topograph-node-data-broker

  - it: omits the service account when the component is disabled
    templates:
      - templates/nodeDataBroker/serviceaccount.yaml
    set:
      nodeDataBroker:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: honors service account annotations
    templates:
      - templates/nodeDataBroker/serviceaccount.yaml
    set:
      nodeDataBroker:
        serviceAccount:
          annotations:
            example.com/role: broker
    asserts:
      - equal:
          path: metadata.annotations["example.com/role"]
          value: broker
