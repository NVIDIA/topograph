suite: subchart security context
# The node-data-broker DaemonSet is rendered through the parent chart. The
# InfiniBand example must opt the broker out of the hardened defaults with a
# COMPLETE, valid privileged override -- under Helm deep-merge a partial
# override (e.g. just privileged: true) would leave allowPrivilegeEscalation:
# false, which the API server rejects at admission. These assertions are
# discriminating (they fail on a partial override), not just a snapshot.
release:
  name: chart-ci
  namespace: topograph
tests:
  - it: hardens the node-data-broker by default
    templates:
      - charts/node-data-broker/templates/daemonset.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: the k8s InfiniBand example broker is a complete valid privileged override
    templates:
      - charts/node-data-broker/templates/daemonset.yaml
    values:
      - ../values.k8s.ib-example.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.privileged
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: false
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: false

  - it: the slinky InfiniBand example broker is a complete valid privileged override
    templates:
      - charts/node-data-broker/templates/daemonset.yaml
    values:
      - ../values.slinky.ib.block-example.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.privileged
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: false
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: false
