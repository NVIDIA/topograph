suite: service
templates:
  - templates/service.yaml
release:
  name: chart-ci
  namespace: topograph
tests:
  - it: renders a ClusterIP Service on the default port
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 49021
      - equal:
          path: spec.ports[0].targetPort
          value: http
      - equal:
          path: spec.ports[0].protocol
          value: TCP
      - equal:
          path: spec.ports[0].name
          value: http

  - it: names the Service after the release fullname
    asserts:
      - equal:
          path: metadata.name
          value: chart-ci-topograph
      - equal:
          path: metadata.namespace
          value: topograph

  - it: honors the top-level service type and port overrides
    set:
      service:
        type: NodePort
        port: 30000
    asserts:
      - equal:
          path: spec.type
          value: NodePort
      - equal:
          path: spec.ports[0].port
          value: 30000

  - it: targets pods via the selector labels
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: topograph
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: chart-ci
