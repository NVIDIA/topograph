suite: servicemonitor
templates:
  - templates/servicemonitor.yaml
release:
  name: chart-ci
  namespace: topograph
tests:
  - it: is not rendered by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a ServiceMonitor when enabled
    set:
      serviceMonitor:
        enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: apiVersion
          value: monitoring.coreos.com/v1
      - equal:
          path: spec.endpoints[0].path
          value: /metrics
