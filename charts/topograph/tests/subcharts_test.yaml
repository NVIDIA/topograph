suite: subchart wiring
# Subchart templates are rendered through the parent chart so that shared
# helpers (topograph.url, etc.) and global values are available.
release:
  name: chart-ci
  namespace: topograph
tests:
  - it: node-observer replicaCount override scales the Deployment
    templates:
      - charts/node-observer/templates/deployment.yaml
    set:
      node-observer:
        replicaCount: 2
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 2

  - it: node-observer wait init container polls the topograph healthz endpoint
    templates:
      - charts/node-observer/templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait
      - matchRegex:
          path: spec.template.spec.initContainers[0].args[1]
          pattern: "http://chart-ci\\.topograph\\.svc\\.cluster\\.local:49021/healthz"

  - it: node-observer image tag falls back to the chart appVersion when empty
    templates:
      - charts/node-observer/templates/deployment.yaml
    set:
      node-observer:
        image:
          tag: ""
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^ghcr.io/nvidia/topograph:v[0-9]+\\.[0-9]+\\.[0-9]+$"

  - it: node-data-broker renders the init container by default
    templates:
      - charts/node-data-broker/templates/daemonset.yaml
    asserts:
      - isKind:
          of: DaemonSet
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: init-node-labels

  - it: node-data-broker init container passes the provider and NODE_NAME
    templates:
      - charts/node-data-broker/templates/daemonset.yaml
    set:
      global:
        provider:
          name: infiniband-k8s
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].args
          content: --provider=infiniband-k8s
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName

  - it: node-data-broker init container forwards the GPU clique label flag and extra args
    templates:
      - charts/node-data-broker/templates/daemonset.yaml
    set:
      global:
        provider:
          name: infiniband-k8s
          params:
            useGpuCliqueLabel: true
      node-data-broker:
        initc:
          extraArgs:
            - foo=bar
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].args
          content: --set=useGpuCliqueLabel=true
      - contains:
          path: spec.template.spec.initContainers[0].args
          content: --set=foo=bar

  - it: node-data-broker initc.enabled=false omits the init container
    templates:
      - charts/node-data-broker/templates/daemonset.yaml
    set:
      node-data-broker:
        initc:
          enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.initContainers

  - it: node-data-broker.enabled=false omits the DaemonSet entirely
    templates:
      - charts/node-data-broker/templates/daemonset.yaml
    set:
      node-data-broker:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: node-data-broker configMapMounts render a ConfigMap mounted as a file
    templates:
      - charts/node-data-broker/templates/configmap-mounts.yaml
    set:
      node-data-broker:
        configMapMounts:
          - name: ibdiag
            mountPath: /etc/infiniband-diags/ibdiag.conf
            subPath: ibdiag.conf
            data:
              ibdiag.conf: |-
                CA=smi0
                Port=1
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: chart-ci-node-data-broker-ibdiag
      - matchRegex:
          path: data["ibdiag.conf"]
          pattern: "CA=smi0"
      - matchRegex:
          path: data["ibdiag.conf"]
          pattern: "Port=1"
