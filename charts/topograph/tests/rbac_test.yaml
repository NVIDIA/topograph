suite: rbac
templates:
  - templates/rbac.yaml
release:
  name: chart-ci
  namespace: topograph
tests:
  - it: renders a ClusterRole and ClusterRoleBinding by default
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: ClusterRole
        documentIndex: 0
      - isKind:
          of: ClusterRoleBinding
        documentIndex: 1

  - it: still renders for an existing service account
    set:
      serviceAccount:
        create: false
        name: existing-topograph-sa
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: chart-ci-topograph
        documentIndex: 0
      - equal:
          path: metadata.name
          value: chart-ci-topograph
        documentIndex: 1
      - equal:
          path: roleRef.name
          value: chart-ci-topograph
        documentIndex: 1
      - equal:
          path: subjects[0].name
          value: existing-topograph-sa
        documentIndex: 1

  - it: is omitted entirely when rbac.create is false
    set:
      rbac:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: grants core node and pod read access by default
    documentIndex: 0
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [pods]
            verbs: [list]
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [nodes]
            verbs: [get, list]
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [nodes]
            verbs: [update]
      - contains:
          path: rules
          content:
            apiGroups: [apps]
            resources: [daemonsets]
            verbs: [get]

  - it: does not grant provider- or engine-specific access by default
    documentIndex: 0
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: [pods/exec]
            verbs: [create]
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: [configmaps]
            verbs: [create, get, update]
      - notContains:
          path: rules
          content:
            apiGroups: [nfd.k8s-sigs.io]
            resources: [nodefeatures, nodefeaturegroups]
            verbs: [create, list, patch, delete]
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: [pods]
            verbs: [get, list]
      - notContains:
          path: rules
          content:
            apiGroups: [apps]
            resources: [daemonsets]
            verbs: [get, list]

  - it: grants pods/exec for the infiniband-k8s provider
    set:
      provider:
        name: infiniband-k8s
    documentIndex: 0
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [pods/exec]
            verbs: [create]

  - it: grants configmaps for the slinky engine
    set:
      engine:
        name: slinky
    documentIndex: 0
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [configmaps]
            verbs: [create, get, update]
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: [configmaps]
            verbs: [create, get, list, update]
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [nodes]
            verbs: [patch]

  - it: does not grant node patch access to non-slinky engines
    set:
      engine:
        name: k8s
    documentIndex: 0
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: [nodes]
            verbs: [patch]
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [nodes]
            verbs: [update]

  - it: does not grant node update access to the slinky engine
    set:
      engine:
        name: slinky
    documentIndex: 0
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [nodes]
            verbs: [get, list]
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [nodes]
            verbs: [patch]
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: [nodes]
            verbs: [update]

  - it: does not render NFD namespace RBAC for an explicit non-NFD engine
    set:
      engine:
        name: slinky
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: ClusterRole
        documentIndex: 0
      - isKind:
          of: ClusterRoleBinding
        documentIndex: 1

  - it: grants NFD CR access for the nfd engine
    set:
      engine:
        name: nfd
    asserts:
      - hasDocuments:
          count: 4
      - notContains:
          path: rules
          content:
            apiGroups: [nfd.k8s-sigs.io]
            resources: [nodefeatures, nodefeaturegroups]
            verbs: [create, list, patch, delete]
        documentIndex: 0
      - isKind:
          of: Role
        documentIndex: 2
      - equal:
          path: metadata.namespace
          value: node-feature-discovery
        documentIndex: 2
      - contains:
          path: rules
          content:
            apiGroups: [nfd.k8s-sigs.io]
            resources: [nodefeatures, nodefeaturegroups]
            verbs: [create, list, patch, delete]
        documentIndex: 2
      - isKind:
          of: RoleBinding
        documentIndex: 3
      - equal:
          path: metadata.namespace
          value: node-feature-discovery
        documentIndex: 3
      - equal:
          path: roleRef.kind
          value: Role
        documentIndex: 3
      - equal:
          path: subjects[0].namespace
          value: topograph
        documentIndex: 3

  - it: scopes NFD CR access to the configured namespace
    set:
      engine:
        name: nfd
      nfdNamespace: custom-nfd
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-nfd
        documentIndex: 2
      - equal:
          path: metadata.namespace
          value: custom-nfd
        documentIndex: 3

  - it: does not grant pods/exec for slinky with a default flat cluster topology
    set:
      engine:
        name: slinky
        params:
          topologies:
            - clusterDefault: true
              plugin: topology/flat
    documentIndex: 0
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: [pods/exec]
            verbs: [create]

  - it: grants pods/exec for slinky partition discovery topologies
    set:
      engine:
        name: slinky
        params:
          topologies:
            - partition: gpu
    documentIndex: 0
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [pods/exec]
            verbs: [create]

  - it: does not grant pods/exec for slinky when dynamic nodes are enabled
    set:
      engine:
        name: slinky
        params:
          useDynamicNodes: true
          topologies:
            - partition: gpu
    documentIndex: 0
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: [pods/exec]
            verbs: [create]

  - it: binds the ClusterRole to the service account in the release namespace
    documentIndex: 1
    asserts:
      - equal:
          path: roleRef.name
          value: chart-ci-topograph
      - equal:
          path: subjects[0].name
          value: chart-ci-topograph
      - equal:
          path: subjects[0].namespace
          value: topograph
