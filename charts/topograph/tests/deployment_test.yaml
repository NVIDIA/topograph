suite: topograph deployment
# configmap.yml is rendered alongside deployment.yaml because the Deployment
# references it for its checksum/config pod annotation. Assertions are scoped
# to the Deployment via the per-assert `template` selector.
templates:
  - templates/deployment.yaml
  - templates/configmap.yml
release:
  name: chart-ci
  namespace: topograph
tests:
  - it: renders a Deployment with a single replica by default
    asserts:
      - isKind:
          of: Deployment
        template: templates/deployment.yaml
      - equal:
          path: spec.replicas
          value: 1
        template: templates/deployment.yaml

  - it: image tag falls back to the chart appVersion when empty
    chart:
      appVersion: v1.2.3
    set:
      image:
        tag: ""
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/nvidia/topograph:v1.2.3
        template: templates/deployment.yaml

  - it: a custom repository still derives its tag from the appVersion
    chart:
      appVersion: v1.2.3
    set:
      image:
        repository: registry.example.com/topograph
        tag: ""
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: registry.example.com/topograph:v1.2.3
        template: templates/deployment.yaml

  - it: injects a fully custom image from a private registry
    set:
      image:
        repository: private.registry.io/team/topograph
        tag: 2024.10.1-rc3
        pullPolicy: Always
      imagePullSecrets:
        - name: private-registry
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: private.registry.io/team/topograph:2024.10.1-rc3
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: private-registry
        template: templates/deployment.yaml

  - it: GCP workload identity federation wires the credentials env and volumes
    set:
      global:
        provider:
          name: gcp
          params:
            workloadIdentityFederation:
              credentialsConfigmap: gcp-creds
              audience: //iam.googleapis.com/projects/1/locations/global/workloadIdentityPools/p/providers/pr
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GOOGLE_APPLICATION_CREDENTIALS
            value: /etc/topograph/gcp/credentials-config.json
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.volumes
          content:
            name: credentials-config
            configMap:
              name: gcp-creds
        template: templates/deployment.yaml

  - it: GCP service account keys mount the secret-backed credentials file
    set:
      global:
        provider:
          name: gcp
          params:
            serviceAccountKeysSecret: gcp-sa-keys
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GOOGLE_APPLICATION_CREDENTIALS
            value: /etc/topograph/gcp/service-account-keys.json
        template: templates/deployment.yaml

  - it: carries the standard recommended labels and selector
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: topograph
        template: templates/deployment.yaml
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
        template: templates/deployment.yaml
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: topograph
        template: templates/deployment.yaml
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: chart-ci
        template: templates/deployment.yaml

  - it: wires the service account and a config checksum annotation
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: chart-ci-topograph
        template: templates/deployment.yaml
      - isNotNullOrEmpty:
          path: spec.template.metadata.annotations["checksum/config"]
        template: templates/deployment.yaml

  - it: exposes the container port from the global service port
    set:
      global:
        service:
          port: 30000
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 30000
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http
        template: templates/deployment.yaml

  - it: injects the node-data-broker coordinates as environment variables
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NODE_DATA_BROKER_NAME
            value: chart-ci-node-data-broker
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NODE_DATA_BROKER_NAMESPACE
            value: topograph
        template: templates/deployment.yaml

  - it: passes the verbosity flag and topology key args
    set:
      verbosity: 5
      topologyNodeLabels:
        accelerator: network.topology.nvidia.com/accelerator
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -v=5
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].args
          content: -k8s-topology-key-accelerator=network.topology.nvidia.com/accelerator
        template: templates/deployment.yaml

  - it: renders user-supplied environment variables
    set:
      env:
        HTTP_PROXY: http://proxy.example.com:3128
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HTTP_PROXY
            value: "http://proxy.example.com:3128"
        template: templates/deployment.yaml

  - it: mounts a credentials secret volume when configured
    set:
      config:
        credentialsSecret: topograph-creds
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: credentials
            secret:
              secretName: topograph-creds
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: credentials
            mountPath: /etc/topograph/credentials
            readOnly: true
        template: templates/deployment.yaml

  - it: propagates pod metadata, scheduling, and image pull secrets
    set:
      podAnnotations:
        prometheus.io/scrape: "true"
      podLabels:
        team: platform
      imagePullSecrets:
        - name: ghcr-creds
      nodeSelector:
        disktype: ssd
      tolerations:
        - key: dedicated
          operator: Equal
          value: topograph
          effect: NoSchedule
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
        template: templates/deployment.yaml
      - equal:
          path: spec.template.metadata.labels["team"]
          value: platform
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: ghcr-creds
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: dedicated
            operator: Equal
            value: topograph
            effect: NoSchedule
        template: templates/deployment.yaml

  - it: an explicit image tag overrides the appVersion, with its pull policy
    chart:
      appVersion: v1.2.3
    set:
      image:
        repository: example.com/topograph
        tag: v9.9.9
        pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: example.com/topograph:v9.9.9
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
        template: templates/deployment.yaml
