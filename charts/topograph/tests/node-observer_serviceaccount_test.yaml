suite: node-observer service account
release:
  name: chart-ci
  namespace: topograph
tests:
  - it: creates a service account by default
    templates:
      - templates/nodeObserver/serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: chart-ci-topograph-node-observer

  - it: omits the service account when create is false
    templates:
      - templates/nodeObserver/serviceaccount.yaml
    set:
      nodeObserver:
        serviceAccount:
          create: false
    asserts:
      - hasDocuments:
          count: 0
