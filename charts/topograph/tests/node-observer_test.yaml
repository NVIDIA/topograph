suite: node-observer workload
# Component templates are rendered through the main chart so shared helpers and
# top-level values are available.
release:
  name: chart-ci
  namespace: topograph
tests:
  - it: derives its name from the root fullname override
    templates:
      - templates/nodeObserver/deployment.yaml
    set:
      fullnameOverride: shared-topograph
    asserts:
      - equal:
          path: metadata.name
          value: shared-topograph-node-observer

  - it: preserves its suffix when the root fullname is truncated
    templates:
      - templates/nodeObserver/deployment.yaml
    set:
      fullnameOverride: a-very-long-topograph-fullname-that-reaches-the-kubernetes-dns-limit
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: "-node-observer$"

  - it: scales the Deployment with replicaCount
    templates:
      - templates/nodeObserver/deployment.yaml
    set:
      nodeObserver:
        replicaCount: 2
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 2

  - it: monitors the topograph API pod from the main container
    templates:
      - templates/nodeObserver/deployment.yaml
      - templates/nodeObserver/configmap.yml
    asserts:
      - notExists:
          path: spec.template.spec.initContainers
        template: templates/nodeObserver/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].command[0]
          value: /usr/local/bin/node-observer
        template: templates/nodeObserver/deployment.yaml
      - matchRegex:
          path: data["node-observer-config.yaml"]
          pattern: "apiServer:"
        template: templates/nodeObserver/configmap.yml
      - matchRegex:
          path: data["node-observer-config.yaml"]
          pattern: 'generateTopologyUrl: "http://chart-ci-topograph.topograph.svc.cluster.local:49021/v1/generate"'
        template: templates/nodeObserver/configmap.yml
      - matchRegex:
          path: data["node-observer-config.yaml"]
          pattern: "containerName: topograph"
        template: templates/nodeObserver/configmap.yml
      - matchRegex:
          path: data["node-observer-config.yaml"]
          pattern: "app.kubernetes.io/component: api-server"
        template: templates/nodeObserver/configmap.yml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NODE_DATA_BROKER_NAME
            value: chart-ci-topograph-node-data-broker
        template: templates/nodeObserver/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NODE_DATA_BROKER_NAMESPACE
            value: topograph
        template: templates/nodeObserver/deployment.yaml

  - it: omits the node-data-broker coordinates when disabled
    templates:
      - templates/nodeObserver/deployment.yaml
    set:
      nodeDataBroker:
        enabled: false
      nodeObserver:
        env:
          FOO: BAR
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FOO
            value: BAR
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: NODE_DATA_BROKER_NAME
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: NODE_DATA_BROKER_NAMESPACE

  - it: uses an existing service account when creation is disabled
    templates:
      - templates/nodeObserver/deployment.yaml
    set:
      nodeObserver:
        serviceAccount:
          create: false
          name: existing-node-observer-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: existing-node-observer-sa

  - it: falls back to the chart appVersion when the image tag is empty
    templates:
      - templates/nodeObserver/deployment.yaml
    set:
      image:
        tag: ""
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^ghcr.io/nvidia/topograph:v[0-9]+\\.[0-9]+\\.[0-9]+(-[0-9A-Za-z-]+(\\.[0-9A-Za-z-]+)*)?$"

  - it: uses the shared root container settings
    templates:
      - templates/nodeObserver/deployment.yaml
    set:
      image:
        repository: registry.example.com/topograph
        tag: shared
        pullPolicy: Always
      imagePullSecrets:
        - name: shared-registry
      verbosity: 7
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: registry.example.com/topograph:shared
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: shared-registry
      - contains:
          path: spec.template.spec.containers[0].args
          content: -v=7

  - it: renders user-supplied environment variables, initContainers, and lifecycle
    templates:
      - templates/nodeObserver/deployment.yaml
    set:
      nodeObserver:
        env:
          FOO: BAR
        initContainers:
          - name: wait-for-api
            image: busybox:latest
            command:
              - sh
              - -c
              - "true"
        lifecycle:
          preStop:
            exec:
              command:
                - sh
                - -c
                - "true"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FOO
            value: BAR
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-api
      - equal:
          path: spec.template.spec.containers[0].lifecycle.preStop.exec.command[2]
          value: "true"
