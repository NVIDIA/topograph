suite: service account
templates:
  - templates/serviceaccount.yaml
release:
  name: chart-ci
  namespace: topograph
tests:
  - it: is created by default and named after the release fullname
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: chart-ci-topograph
      - equal:
          path: automountServiceAccountToken
          value: true

  - it: is omitted when serviceAccount.create is false
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: honors an explicit service account name
    set:
      serviceAccount:
        name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: renders annotations and respects the automount toggle
    set:
      serviceAccount:
        automount: false
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/topograph
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/topograph
