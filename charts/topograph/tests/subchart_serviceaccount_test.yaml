suite: subchart service accounts
release:
  name: chart-ci
  namespace: topograph
tests:
  - it: node-observer creates a service account by default
    templates:
      - charts/node-observer/templates/serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: chart-ci-node-observer

  - it: node-observer omits the service account when create is false
    templates:
      - charts/node-observer/templates/serviceaccount.yaml
    set:
      node-observer:
        serviceAccount:
          create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: node-data-broker creates a service account by default
    templates:
      - charts/node-data-broker/templates/serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: chart-ci-node-data-broker

  - it: node-data-broker omits the service account when the subchart is disabled
    templates:
      - charts/node-data-broker/templates/serviceaccount.yaml
    set:
      node-data-broker:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: node-data-broker honors service account annotations
    templates:
      - charts/node-data-broker/templates/serviceaccount.yaml
    set:
      node-data-broker:
        serviceAccount:
          annotations:
            example.com/role: broker
    asserts:
      - equal:
          path: metadata.annotations["example.com/role"]
          value: broker
