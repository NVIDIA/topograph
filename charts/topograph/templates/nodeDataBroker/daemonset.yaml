{{- if .Values.nodeDataBroker.enabled }}
{{- $providerParams := default dict .Values.provider.params }}
{{- $useGpuCliqueLabel := and (eq .Values.provider.name "infiniband-k8s") (eq (lower (toString (get $providerParams "useGpuCliqueLabel"))) "true") }}
{{- $configMapMounts := default list .Values.nodeDataBroker.configMapMounts }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "nodeDataBroker.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nodeDataBroker.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "nodeDataBroker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nodeDataBroker.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "nodeDataBroker.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.nodeDataBroker.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeDataBroker.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: node-data-broker
          securityContext:
            {{- toYaml .Values.nodeDataBroker.securityContext | nindent 12 }}
          image: {{ include "topograph.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/local/bin/node-data-broker
          args:
            - --provider={{ .Values.provider.name }}
            - -v={{ .Values.verbosity }}
            - --port={{ .Values.nodeDataBroker.port }}
            {{- if $useGpuCliqueLabel }}
            - --set=useGpuCliqueLabel=true
            {{- end }}
            {{- range .Values.nodeDataBroker.extraArgs }}
            - --set={{ . }}
            {{- end }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- range $key, $value := .Values.nodeDataBroker.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- with .Values.nodeDataBroker.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.nodeDataBroker.port }}
              protocol: TCP
          # The broker applies node annotations before it starts serving
          # /healthz. The startup probe gates liveness/readiness so slow
          # providers (e.g. infiniband ibnetdiscover) have up to
          # failureThreshold * periodSeconds to finish before the container can
          # be restarted.
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: {{ .Values.nodeDataBroker.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.nodeDataBroker.startupProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.nodeDataBroker.resources | nindent 12 }}
          {{- if or $configMapMounts .Values.nodeDataBroker.volumeMounts }}
          volumeMounts:
            {{- range $configMapMounts }}
            - name: {{ include "nodeDataBroker.configMapMountVolumeName" (dict "name" .name) }}
              mountPath: {{ required "nodeDataBroker.configMapMounts[].mountPath is required" .mountPath | quote }}
              {{- with .subPath }}
              subPath: {{ . | quote }}
              {{- end }}
              readOnly: true
            {{- end }}
            {{- with .Values.nodeDataBroker.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or $configMapMounts .Values.nodeDataBroker.volumes }}
      volumes:
        {{- range $configMapMounts }}
        - name: {{ include "nodeDataBroker.configMapMountVolumeName" (dict "name" .name) }}
          configMap:
            name: {{ include "nodeDataBroker.configMapMountName" (dict "root" $ "name" .name) }}
        {{- end }}
        {{- with .Values.nodeDataBroker.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeDataBroker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeDataBroker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeDataBroker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
