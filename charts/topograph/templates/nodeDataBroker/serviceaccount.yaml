{{- if and .Values.nodeDataBroker.enabled .Values.nodeDataBroker.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nodeDataBroker.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nodeDataBroker.labels" . | nindent 4 }}
  {{- with .Values.nodeDataBroker.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.nodeDataBroker.serviceAccount.automount }}
{{- end }}
