apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nodeObserver.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nodeObserver.labels" . | nindent 4 }}
data:
  node-observer-config.yaml: |-
    generateTopologyUrl: "{{ include "topograph.url" $ }}/v1/generate"
    provider:
      {{- toYaml .Values.provider | nindent 6 }}
    engine:
      {{- toYaml .Values.engine | nindent 6 }}
    {{- if .Values.nodeObserver.topograph.apiServer.enabled }}
    apiServer:
      namespace: {{ .Release.Namespace }}
      containerName: {{ .Values.nodeObserver.topograph.apiServer.containerName | default "topograph" }}
      podSelector:
        {{- if .Values.nodeObserver.topograph.apiServer.podSelector }}
        {{- toYaml .Values.nodeObserver.topograph.apiServer.podSelector | nindent 8 }}
        {{- else }}
        matchLabels:
          app.kubernetes.io/component: api-server
          app.kubernetes.io/instance: {{ .Release.Name }}
        {{- end }}
    {{- end }}
    trigger:
      {{- toYaml .Values.nodeObserver.topograph.trigger | nindent 6 }}
