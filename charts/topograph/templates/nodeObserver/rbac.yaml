{{- if .Values.nodeObserver.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nodeObserver.rbacName" . }}
rules:
- apiGroups: [""]
  resources: [pods]
  verbs: [list,watch]
{{- if .Values.nodeDataBroker.enabled }}
- apiGroups: [apps]
  resources: [daemonsets]
  verbs: [list,watch]
{{- end }}
{{- if (default dict .Values.nodeObserver.topograph.trigger).nodeSelector }}
- apiGroups: [""]
  resources: [nodes]
  verbs: [list,watch]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nodeObserver.rbacName" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "nodeObserver.serviceAccountName" . }}
  namespace: {{.Release.Namespace}}
  apiGroup: ""
roleRef:
  kind: ClusterRole
  name: {{ include "nodeObserver.rbacName" . }}
  apiGroup: ""
{{- end }}
