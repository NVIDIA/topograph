{{- if .Values.nodeObserver.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nodeObserver.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nodeObserver.labels" . | nindent 4 }}
  {{- with .Values.nodeObserver.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.nodeObserver.serviceAccount.automount }}
{{- end }}
