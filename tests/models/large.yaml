#      _________________ core __________________
#      |       |       |       |       |       |
#   spine-1 spine-2 spine-3 spine-4 spine-5 spine-6
#      |       |       |       |       |       |
#      |      ...     ...     ...     ...     ...
#      |
#      ____________
#      |          |
#   leaf-1-1   leaf-1-2
#      |          |
#   -------    -------
#    1101       1201
#     ...        ...
#    1108       1208
#   -------    ------- 
#   nvl-1-1    nvl-1-2
#
# Supported block sizes: 8, 16, 32
#
switches:
  core:
    labels:
      topology.kubernetes.io/region: us-east
    switches:
    - spine-1
    - spine-2
    - spine-3
    - spine-4
    - spine-5
    - spine-6
  spine-1:
    labels:
      topology.kubernetes.io/zone: zone1
    switches:
    - leaf-1-1
    - leaf-1-2
  spine-2:
    labels:
      topology.kubernetes.io/zone: zone1
    switches:
    - leaf-2-1
    - leaf-2-2
  spine-3:
    labels:
      topology.kubernetes.io/zone: zone2
    switches:
    - leaf-3-1
    - leaf-3-2
  spine-4:
    labels:
      topology.kubernetes.io/zone: zone2
    switches:
    - leaf-4-1
    - leaf-4-2
  spine-5:
    labels:
      topology.kubernetes.io/zone: zone3
    switches:
    - leaf-5-1
    - leaf-5-2
  spine-6:
    labels:
      topology.kubernetes.io/zone: zone3
    switches:
    - leaf-6-1
    - leaf-6-2
