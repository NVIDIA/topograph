#      _________
#      |       |
#   spine-1 spine-2
#      |       |
#      |      ...
#      |
#      ____________
#      |          |
#   leaf-1-1   leaf-1-2
#      |          |
#   -------    -------
#    1101       1201
#     ...        ...
#    1118       1218
#   -------    -------
#   nvl-1-1    nvl-1-2
#
# Supported block sizes: 18, 36, 72
#
switches:
  core:
    labels:
      topology.kubernetes.io/region: us-east
    switches:
    - spine-1
    - spine-2
  spine-1:
    labels:
      topology.kubernetes.io/zone: zone1
    switches:
    - leaf-1-1
    - leaf-1-2
  spine-2:
    labels:
      topology.kubernetes.io/zone: zone1
    switches:
    - leaf-2-1
    - leaf-2-2
blocks:
- switch: leaf-1-1
  nodes:
  - node[1101-1118]
  labels:
    network.topology.nvidia.com/accelerator: nvl-1-1
- switch: leaf-1-2
  nodes:
  - node[1201-1218]
  labels:
    network.topology.nvidia.com/accelerator: nvl-1-2
- switch: leaf-2-1
  nodes:
  - node[2101-2118]
  labels:
    network.topology.nvidia.com/accelerator: nvl-2-1
- switch: leaf-2-2
  nodes:
  - node[2201-2218]
  labels:
    network.topology.nvidia.com/accelerator: nvl-2-2
