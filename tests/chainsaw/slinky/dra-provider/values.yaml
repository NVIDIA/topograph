provider:
  name: dra

engine:
  name: slinky
  params:
    plugin: topology/block
    podSelector:
      matchLabels:
        app: slurmd
    topologyConfigmapName: slurm-topology
    topologyConfigPath: topology.conf
    # namespace is injected at install time via --set engine.params.namespace=$NAMESPACE

config:
  requestAggregationDelay: 1s

nodeObserver:
  topograph:
    trigger:
      nodeSelector:
        kubernetes.io/os: linux

nodeDataBroker:
  enabled: false
