gpu:
  profile: gb200

# Keep this aligned with the nvidia.com/gpu.clique labels in kind-cluster.yaml.
# nvml-mock models compute domains and cliques, so this fixture represents a
# small leaf/spine layout as two spine domains, each with two leaf cliques.
#
#   spine-1 (00000000-0000-0000-0000-0000000000ab)
#      |                         |
#   leaf-1-1                  leaf-1-2
#   clique 0                  clique 1
#      |                         |
#   worker-0                  worker-1
#
#   spine-2 (00000000-0000-0000-0000-0000000000cd)
#      |                         |
#   leaf-2-1                  leaf-2-2
#   clique 0                  clique 1
#      |                         |
#   worker-2                  worker-3
topology:
  enabled: true
  domains:
    - name: spine-1
      uuid: "00000000-0000-0000-0000-0000000000ab"
      cliques:
        # leaf-1-1
        - id: 0
          nodes:
            - worker-0
        # leaf-1-2
        - id: 1
          nodes:
            - worker-1
    - name: spine-2
      uuid: "00000000-0000-0000-0000-0000000000cd"
      cliques:
        # leaf-2-1
        - id: 0
          nodes:
            - worker-2
        # leaf-2-2
        - id: 1
          nodes:
            - worker-3

