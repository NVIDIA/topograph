configFiles:
  gres.conf: |
    AutoDetect=nvidia

controller:
  persistence:
    enabled: false
  extraConfMap:
    GresTypes: "gpu"

nodesets:
  slinky:
    scalingMode: DaemonSet
    slurmd:
      env:
        - name: LD_LIBRARY_PATH
          value: /var/lib/nvml-mock/driver/usr/lib64
      volumeMounts:
        - name: nvml-mock-driver
          mountPath: /var/lib/nvml-mock/driver
          readOnly: true
      extraConfMap:
        Gres: ["gpu:GB200:4"]
    podSpec:
      volumes:
        - name: nvml-mock-driver
          hostPath:
            path: /var/lib/nvml-mock/driver
            type: Directory

partitions:
  all:
    enabled: true
    nodesets:
      - ALL

